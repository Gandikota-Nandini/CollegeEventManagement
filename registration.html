<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f8f9fa;
}

.form-container{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

footer{
    background:#212529;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>

</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">
College Events
</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="events.html">Events</a>
</li>

<li class="nav-item">
<a class="nav-link" href="gallery.html">Gallery</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="registration.html">
Registration
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="contact.html">Contact</a>
</li>

</ul>

</div>

</div>
</nav>

<!-- Registration Form -->

<div class="container">
<div class="form-container">

<h2 class="text-center mb-4">
Event Registration Form
</h2>

<div id="successAlert"
class="alert alert-success d-none">

Registration Successful!
Thank you for registering.

</div>

<form id="eventForm">

<div class="mb-3">
<label class="form-label">
Student Name
</label>

<input type="text"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">
Roll Number
</label>

<input type="text"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">
Branch
</label>

<select class="form-select" required>

<option value="">
Select Branch
</option>

<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>Mechanical</option>
<option>Civil</option>
<option>IT</option>

</select>

</div>

<div class="mb-3">
<label class="form-label">
Email
</label>

<input type="email"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">
Mobile Number
</label>

<input type="tel"
class="form-control"
required>
</div>

<div class="mb-3">
<label class="form-label">
Event Selection
</label>

<select class="form-select" required>

<option value="">
Choose Event
</option>

<option>Technical Quiz</option>
<option>Hackathon</option>
<option>Poster Presentation</option>
<option>Coding Contest</option>
<option>Project Expo</option>
<option>Cultural Fest</option>

</select>

</div>

<button type="submit"
class="btn btn-success w-100">

Register Now

</button>

</form>

</div>
</div>

<!-- Footer -->

<footer>

<h5>College Event Management System</h5>

<p>Email: events@college.edu</p>

<p>Phone: +91 9876543210</p>

</footer>

<script>

document.getElementById("eventForm")
.addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("successAlert")
.classList.remove("d-none");

this.reset();

window.scrollTo({
top:0,
behavior:"smooth"
});

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
